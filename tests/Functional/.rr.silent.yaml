version: "3"
# Application configuration
rpc:
    listen: ${ROADRUNNER_ADDRESS:-tcp://127.0.0.1:6001}

server:
    command: "php worker.php"

# Workflow and activity mesh service
temporal:
    address: ${TEMPORAL_ADDRESS:-127.0.0.1:7233}
    activities:
      num_workers: 1

logs:
    mode: none
    # file_logger_options:
    #   log_output: "test-feature.log"
    # channels:
    #   activities:
    #     mode: none

kv:
    test:
        driver: memory
        config:
            interval: 10
